<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RANKING — B42 Em Busca da Aprendizagem</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --b42-purple:       #6a2dbf;
      --b42-purple-light: #a273f5;
      --b42-purple-dark:  #2a1454;
      --b42-orange:       #ff9c1d;
      --b42-orange-dark:  #d65a00;
      --b42-yellow:       #ffe14f;
      --b42-cream:        #fff5e1;
      --b42-red:          #ff3838;
      --b42-pink:         #ff4fa3;
      --b42-cyan:         #4fd6ff;
      --b42-green:        #2ce06f;
      --b42-magenta:      #d24fff;
      --grad-primary: linear-gradient(135deg, #ff9c1d 0%, #ff4fa3 50%, #d24fff 100%);
      --grad-second:  linear-gradient(135deg, #4fd6ff 0%, #6a2dbf 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at center, #2a1454 0%, #0a0420 60%, #000 100%);
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(247,148,29,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139,95,191,0.08), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .ranking-container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
    }

    .brand-stamp {
      font-size: 11px;
      color: var(--b42-yellow);
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #000;
      text-align: center;
      margin-bottom: 10px;
    }

    .page-title {
      font-size: 36px;
      color: var(--b42-orange);
      text-align: center;
      text-shadow:
        4px 4px 0 #000,
        -3px -3px 0 var(--b42-purple),
        0 0 30px rgba(247,148,29,0.5);
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: #ccc;
      text-align: center;
      text-shadow: 1px 1px 0 #000;
      margin-bottom: 30px;
    }

    .ranking-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }

    .ranking-table thead th {
      font-size: 9px;
      color: var(--b42-orange);
      letter-spacing: 2px;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 2px solid var(--b42-purple);
    }

    .ranking-table thead th:first-child { text-align: center; width: 60px; }
    .ranking-table thead th:last-child { text-align: right; }

    .ranking-table tbody tr {
      background: rgba(10, 4, 30, 0.7);
      border: 2px solid rgba(106,45,191,0.3);
      transition: transform 0.15s, background 0.15s;
    }

    .ranking-table tbody tr:hover {
      background: rgba(106,45,191,0.25);
      transform: translateX(4px);
    }

    .ranking-table tbody td {
      padding: 14px 16px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: #fff;
      border-top: 1px solid rgba(106,45,191,0.2);
      border-bottom: 1px solid rgba(106,45,191,0.2);
    }

    .ranking-table tbody td:first-child {
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      border-left: 2px solid rgba(106,45,191,0.3);
      border-radius: 8px 0 0 8px;
    }

    .ranking-table tbody td:last-child {
      text-align: right;
      border-right: 2px solid rgba(106,45,191,0.3);
      border-radius: 0 8px 8px 0;
    }

    /* Top 3 destaques */
    .rank-1 td:first-child { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
    .rank-2 td:first-child { color: #c0c0c0; text-shadow: 0 0 8px rgba(192,192,192,0.5); }
    .rank-3 td:first-child { color: #cd7f32; text-shadow: 0 0 8px rgba(205,127,50,0.5); }

    .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.1), rgba(10,4,30,0.7)) !important; }
    .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.08), rgba(10,4,30,0.7)) !important; }
    .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.08), rgba(10,4,30,0.7)) !important; }

    .rank-medal {
      font-size: 20px;
      display: inline-block;
    }

    .player-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--b42-yellow);
      text-shadow: 1px 1px 0 #000;
    }

    .score-val {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--b42-cyan);
      text-shadow: 1px 1px 0 #000;
    }

    .coins-val {
      color: var(--b42-yellow);
    }

    .kills-val {
      color: #ff5050;
    }

    .levels-val {
      color: var(--b42-green);
    }

    .empty-ranking {
      text-align: center;
      padding: 60px 20px;
      background: rgba(10, 4, 30, 0.6);
      border: 2px solid rgba(106,45,191,0.3);
      border-radius: 12px;
    }

    .empty-ranking .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-ranking .empty-text {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: #aaa;
      line-height: 1.6;
    }

    .back-btn {
      display: inline-block;
      margin-top: 30px;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #fff;
      background: var(--grad-second);
      border: 3px solid #000;
      border-radius: 10px;
      padding: 16px 30px;
      cursor: pointer;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
      letter-spacing: 2px;
      text-decoration: none;
      box-shadow:
        0 6px 0 rgba(0,0,0,0.7),
        0 0 22px rgba(106,45,191,0.45),
        inset 0 2px 0 rgba(255,255,255,0.4),
        inset 0 -2px 0 rgba(0,0,0,0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.15s;
    }

    .back-btn:hover {
      filter: brightness(1.15) saturate(1.15);
      transform: translateY(-2px);
    }

    .back-btn:active {
      transform: translateY(4px);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.7),
        0 0 14px rgba(106,45,191,0.45);
    }

    .refresh-btn {
      display: inline-block;
      margin-top: 12px;
      margin-left: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #fff;
      background: linear-gradient(135deg, rgba(255,156,29,0.15) 0%, rgba(210,79,255,0.15) 100%);
      border: 2px solid var(--b42-orange);
      border-radius: 8px;
      padding: 12px 22px;
      cursor: pointer;
      letter-spacing: 1px;
      text-decoration: none;
      box-shadow:
        0 4px 0 rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,156,29,0.4);
      transition: transform 0.12s, filter 0.15s;
    }

    .refresh-btn:hover {
      background: linear-gradient(135deg, rgba(255,156,29,0.3) 0%, rgba(210,79,255,0.3) 100%);
      filter: brightness(1.1);
    }

    .actions {
      text-align: center;
    }

    /* Destaque do usuário logado — anima e ressalta a linha pra ele se achar rápido */
    .ranking-table tbody tr.you {
      background: linear-gradient(90deg, rgba(255,79,163,0.28), rgba(106,45,191,0.45)) !important;
      border: 2px solid var(--b42-yellow) !important;
      box-shadow:
        0 0 0 2px rgba(255,225,79,0.25),
        0 0 22px rgba(255,79,163,0.45);
      animation: you-pulse 2.2s ease-in-out infinite;
      position: relative;
    }
    .ranking-table tbody tr.you td:first-child {
      border-left: 2px solid var(--b42-yellow) !important;
    }
    .ranking-table tbody tr.you td:last-child {
      border-right: 2px solid var(--b42-yellow) !important;
    }
    .ranking-table tbody tr.you .player-name {
      color: var(--b42-yellow);
      text-shadow: 1px 1px 0 #000, 0 0 12px rgba(255,225,79,0.6);
    }
    .you-tag {
      display: inline-block;
      margin-left: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #1a0530;
      background: var(--b42-yellow);
      padding: 3px 6px;
      border-radius: 4px;
      letter-spacing: 1px;
      text-shadow: none;
      vertical-align: middle;
    }
    @keyframes you-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(255,225,79,0.25), 0 0 22px rgba(255,79,163,0.45); }
      50%      { box-shadow: 0 0 0 3px rgba(255,225,79,0.5),  0 0 30px rgba(255,79,163,0.75); }
    }
    .you-banner {
      background: linear-gradient(135deg, rgba(255,156,29,0.18) 0%, rgba(210,79,255,0.18) 100%);
      border: 2px solid var(--b42-yellow);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: var(--b42-cream);
      text-align: center;
      letter-spacing: 1px;
    }
    .you-banner strong { color: var(--b42-yellow); font-family: 'Press Start 2P', monospace; font-size: 11px; letter-spacing: 2px; }

    /* Mobile */
    @media (max-width: 600px) {
      .page-title { font-size: 22px; }
      .ranking-table tbody td { padding: 10px 8px; font-size: 16px; }
      .ranking-table thead th { font-size: 7px; padding: 8px; }
      .player-name { font-size: 9px; }
      .score-val { font-size: 11px; }
      .back-btn { font-size: 10px; padding: 12px 20px; }
      .you-tag { font-size: 6px; padding: 2px 4px; }
    }
  </style>
</head>
<body>
  <div class="ranking-container">
    <div class="brand-stamp">B42 EDTECH ★ QUEST DA APRENDIZAGEM</div>
    <h1 class="page-title">RANKING</h1>
    <p class="page-subtitle">Quem coleta mais <strong>Conhecimento</strong> e derrota mais monstros do <strong>Desengajamento</strong> lidera o Reino.</p>

    <div id="ranking-content"></div>

    <div class="actions">
      <a href="index.html" class="back-btn">◄ VOLTAR AO JOGO</a>
      <button class="refresh-btn" onclick="renderRanking()">ATUALIZAR</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/users.js"></script>
  <script>
    async function renderRanking() {
      const container = document.getElementById('ranking-content');
      // Busca o ranking REMOTO (Supabase) se disponível; cai no local.
      const fetcher = (UserSystem.getRankingAsync || UserSystem.getRanking);
      const ranking = await Promise.resolve(fetcher());

      // Usuário logado — usado pra destacar a linha dele no ranking
      const me = (typeof UserSystem !== 'undefined' && UserSystem.getCurrentUser)
        ? UserSystem.getCurrentUser() : null;
      const myName = me && me.playerName ? me.playerName.toLowerCase() : null;

      if (ranking.length === 0) {
        container.innerHTML = `
          <div class="empty-ranking">
            <div class="empty-icon">🏆</div>
            <div class="empty-text">
              Nenhum jogador cadastrado ainda.<br>
              Crie uma conta no jogo e conquiste o primeiro lugar!
            </div>
          </div>
        `;
        return;
      }

      const medals = ['🥇', '🥈', '🥉'];

      // Posição do jogador logado (se ele aparecer no ranking)
      let myPos = -1;
      if (myName) {
        myPos = ranking.findIndex(p => (p.playerName || '').toLowerCase() === myName);
      }

      let html = '';
      if (me && myPos >= 0) {
        html += `
          <div class="you-banner">
            ★ Olá, <strong>${escapeHtml(me.playerName)}</strong> — você está em
            <strong>#${myPos + 1}</strong> de ${ranking.length}.
            Sua linha está destacada abaixo. ★
          </div>
        `;
      } else if (me) {
        html += `
          <div class="you-banner">
            ★ Olá, <strong>${escapeHtml(me.playerName)}</strong> — jogue uma partida pra entrar no ranking! ★
          </div>
        `;
      }

      html += `
        <table class="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>JOGADOR</th>
              <th>FASES</th>
              <th>CONHECIMENTO</th>
              <th>MONSTROS<br>DERROTADOS</th>
              <th>SCORE</th>
            </tr>
          </thead>
          <tbody>
      `;

      ranking.forEach((player, i) => {
        const pos = i + 1;
        const isMe = myName && (player.playerName || '').toLowerCase() === myName;
        const rowCls = (pos <= 3 ? `rank-${pos} ` : '') + (isMe ? 'you' : '');
        const medal = pos <= 3 ? `<span class="rank-medal">${medals[i]}</span>` : pos;
        const youTag = isMe ? '<span class="you-tag">VOCÊ</span>' : '';
        const rowAttr = isMe ? ' id="my-rank-row"' : '';

        html += `
          <tr class="${rowCls.trim()}"${rowAttr}>
            <td>${medal}</td>
            <td><span class="player-name">${escapeHtml(player.playerName)}</span>${youTag}</td>
            <td><span class="levels-val">${player.levelsCompleted}/5</span></td>
            <td><span class="coins-val">${player.totalCoins}</span></td>
            <td><span class="kills-val">${player.totalKills || 0}</span></td>
            <td><span class="score-val">${String(player.bestScore).padStart(6, '0')}</span></td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;

      // Rola até a linha do jogador logado pra ele encontrar fácil
      if (myPos >= 0) {
        const row = document.getElementById('my-rank-row');
        if (row) {
          // Espera o paint pra o scroll considerar layout final
          requestAnimationFrame(() => {
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    renderRanking();
  </script>
</body>
</html>
